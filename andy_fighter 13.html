<script>
// Minimal ES5-only bootstrap script - deliberately avoids any modern syntax
// (arrow functions, template literals, let/const, destructuring, etc.) so it
// always parses and runs even on very old engines. It runs completely
// independently of the main game script below, so if THAT script fails to
// even parse on this device, this one can still catch and show the error.
(function() {
  var ebox = document.getElementById('errBox');
  window.onerror = function(msg, url, line, col, err) {
    if (ebox) {
      ebox.style.display = 'block';
      ebox.textContent = (ebox.textContent ? ebox.textContent + '\n---\n' : '') + 'FEL: ' + msg + ' (rad ' + line + ', kol ' + col + ')';
    }
    return false;
  };
})();
</script>
<script>
const canvas = document.getElementById('game');
function showError(msg) {
  const box = document.getElementById('errBox');
  if (!box) return;
  box.style.display = 'block';
  box.textContent = (box.textContent ? box.textContent + '\n---\n' : '') + msg;
}
window.addEventListener('error', (e) => {
  showError('Fel: ' + e.message + ' (rad ' + e.lineno + ')');
});
window.addEventListener('unhandledrejection', (e) => {
  showError('Ohanterat promise-fel: ' + e.reason);
});
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const groundY = H - 56;

// (on-screen diagnostics removed - kept counters below harmless)
let dbgClicks = 0;
let dbgFrames = 0;

let keys = {};
let running = false;

// ---------- Sound engine (fully synthesized, no audio files needed) ----------
const Sound = (() => {
  let ctxA = null;
  let musicTimer = null;
  function ensure() {
    if (!ctxA) ctxA = new (window.AudioContext || window.webkitAudioContext)();
    if (ctxA.state === 'suspended') ctxA.resume();
    return ctxA;
  }
  function tone(freq, duration, type, startGain, opts = {}) {
    try {
      const ac = ensure();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ac.currentTime);
      if (opts.freqEnd !== undefined) {
        osc.frequency.exponentialRampToValueAtTime(Math.max(opts.freqEnd,1), ac.currentTime + duration);
      }
      gain.gain.setValueAtTime(startGain, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
      osc.stop(ac.currentTime + duration);
    } catch (err) { /* audio is non-critical - never let it break gameplay */ }
  }
  function noiseBurst(duration, startGain, filterFreq) {
    try {
      const ac = ensure();
      const bufferSize = Math.floor(ac.sampleRate * duration);
      const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
      const src = ac.createBufferSource();
      src.buffer = buffer;
      const filter = ac.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = filterFreq || 1800;
      const gain = ac.createGain();
      gain.gain.setValueAtTime(startGain, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
      src.connect(filter);
      filter.connect(gain);
      gain.connect(ac.destination);
      src.start();
    } catch (err) { /* audio is non-critical - never let it break gameplay */ }
  }
  function rand(min, max) { return min + Math.random() * (max - min); }
  return {
    unlock() { ensure(); },
    whoosh(kind) {
      const dur = kind === 'kick' ? rand(0.15,0.19) : rand(0.09,0.13);
      noiseBurst(dur, 0.13, kind === 'kick' ? 950 : 1500);
      tone(kind === 'kick' ? 500 : 700, dur, 'sine', 0.05, {freqEnd: kind === 'kick' ? 180 : 260});
    },
    hit(kind) {
      // layered impact: sharp crack + low thump body, slight pitch variance each hit
      const v = rand(0.92, 1.08);
      noiseBurst(0.07, 0.4, 2200); // crack
      noiseBurst(0.13, 0.3, 450);  // body
      tone((kind === 'kick' ? 100 : 150) * v, 0.14, 'square', 0.24, {freqEnd: 45});
      tone((kind === 'kick' ? 60 : 85) * v, 0.2, 'sine', 0.2, {freqEnd: 30});
    },
    hurt() {
      const v = rand(0.94, 1.06);
      noiseBurst(0.15, 0.32, 750);
      tone(150 * v, 0.24, 'sawtooth', 0.2, {freqEnd: 48});
    },
    enemyDown() {
      tone(300, 0.28, 'triangle', 0.2, {freqEnd: 80});
      noiseBurst(0.18, 0.15, 350);
    },
    levelUp() {
      const ac = ensure();
      [523, 659, 784, 1047].forEach((f,i) => {
        setTimeout(() => tone(f, 0.22, 'square', 0.16), i*90);
      });
    },
    gameOver() {
      [400, 340, 280, 200].forEach((f,i) => {
        setTimeout(() => tone(f, 0.35, 'sawtooth', 0.18), i*140);
      });
    },
    click() {
      tone(700, 0.08, 'square', 0.15);
    },
    footstep() {
      noiseBurst(0.05, 0.06, 300);
    },
    heal() {
      [523, 659, 784, 1047, 1319].forEach((f,i) => {
        setTimeout(() => tone(f, 0.18, 'sine', 0.15), i*55);
      });
    },
    intro() {
      // low gong-like hit to open
      noiseBurst(0.5, 0.22, 280);
      tone(100, 0.55, 'sine', 0.18, {freqEnd: 50});
      // short martial rising riff
      const notes = [330, 392, 440, 523, 659];
      const durs  = [180, 180, 180, 140, 420];
      let t = 260;
      notes.forEach((f,i) => {
        setTimeout(() => tone(f, durs[i]/1000, 'square', 0.14), t);
        t += durs[i];
      });
    },
    startMusic() {
      if (musicTimer) return;
      ensure();
      // a looping oriental-flavored bassline + light hi-hat, low volume so it sits under the sfx
      const bass =   [110, 110, 130.81, 110, 146.83, 130.81, 123.47, 98];
      const melody = [0, 220, 0, 261.63, 0, 0, 246.94, 0];
      let step = 0;
      function playStep() {
        if (!musicTimer) return;
        const b = bass[step % bass.length];
        tone(b, 0.34, 'triangle', 0.05);
        const m = melody[step % melody.length];
        if (m) tone(m, 0.22, 'sine', 0.035);
        if (step % 2 === 0) noiseBurst(0.04, 0.02, 4000);
        step++;
        musicTimer = setTimeout(playStep, 260);
      }
      musicTimer = setTimeout(playStep, 10);
    },
    stopMusic() {
      clearTimeout(musicTimer);
      musicTimer = null;
    }
  };
})();
let stage = 1;
let score = 0;
let enemiesDefeatedThisStage = 0;
let enemiesNeeded = 6;
let frameCount = 0;
let shake = 0;
let flashTimer = 0;

// ---- forward progression: camera, level length, pit hazard, lives, boss ----
let cameraX = 0;
let levelLength = 2400;
let checkpointX = 0;
let lives = 3;
let pits = [];          // array of { x, halfW } in world coordinates
let block = null;       // { x, halfW, height } - a stone block obstacle to jump over
let boss = null;         // reference into `enemies` once spawned
let bossSpawned = false;
let bossDefeated = false;

const player = {
  x: W/2, y: groundY, w: 42, h: 74,
  vy: 0, onGround: true, ducking: false,
  facing: 1,
  health: 100, maxHealth: 100,
  attackTimer: 0, attackType: null, attackHit: false, lowAttack: false, jumpKick: false,
  hurtTimer: 0, speed: 4.2, walkPhase: 0, moving:false, airTime: 0
};

let enemies = [];
let particles = [];
let sparks = [];
let knives = [];
let pickups = [];
let gasClouds = []; // { x, y, radius, life, tickTimer } - from the old master's bottle throw
let spawnCooldown = 0;
let gameOverFlag = false;

const stars = Array.from({length: 40}, () => ({
  x: Math.random()*W, y: Math.random()*(groundY*0.5), r: Math.random()*1.6+0.3, tw: Math.random()*Math.PI*2
}));
const mountains = [
  {y:0.55, color:'#241236', amp:40, speedMul:0.15},
  {y:0.68, color:'#3a1a4a', amp:55, speedMul:0.3},
];
const pagodas = Array.from({length:5}, (_,i)=>({ baseX: i*220 - 40, w: 60+Math.random()*20 }));

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ---------- Touch controls: map on-screen buttons to the same keys object ----------
function bindTouchButton(id, code) {
  const el = document.getElementById(id);
  if (!el) return;
  const press = (e) => {
    e.preventDefault();
    keys[code] = true;
    el.classList.add('active');
    Sound.unlock();
  };
  const release = (e) => {
    e.preventDefault();
    keys[code] = false;
    el.classList.remove('active');
  };
  el.addEventListener('touchstart', press, {passive:false});
  el.addEventListener('touchend', release, {passive:false});
  el.addEventListener('touchcancel', release, {passive:false});
  // also support mouse (useful for testing on desktop / hybrid devices)
  el.addEventListener('mousedown', press);
  el.addEventListener('mouseup', release);
  el.addEventListener('mouseleave', release);
}
// ---------- Virtual joystick: drag the dot around inside the circle to move ----------
function setupJoystick() {
  const base = document.getElementById('joystickBase');
  const thumb = document.getElementById('joystickThumb');
  if (!base || !thumb) return;
  const maxDist = 38;   // how far the thumb can travel from center, in CSS px
  const deadzone = 12;  // ignore tiny movements near the center
  let activeTouchId = null;

  function updateFromPoint(clientX, clientY) {
    const rect = base.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = clientX - cx;
    let dy = clientY - cy;
    const dist = Math.hypot(dx, dy);
    if (dist > maxDist) { dx = dx / dist * maxDist; dy = dy / dist * maxDist; }
    thumb.style.transform = `translate(${dx}px, ${dy}px)`;

    keys['ArrowLeft'] = dx < -deadzone;
    keys['ArrowRight'] = dx > deadzone;
    keys['ArrowUp'] = dy < -deadzone;
    keys['ArrowDown'] = dy > deadzone;
  }

  function reset() {
    thumb.style.transform = 'translate(0px, 0px)';
    keys['ArrowLeft'] = false;
    keys['ArrowRight'] = false;
    keys['ArrowUp'] = false;
    keys['ArrowDown'] = false;
    base.classList.remove('active');
  }

  // touch events - the most broadly supported mechanism on mobile browsers
  base.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    activeTouchId = t.identifier;
    base.classList.add('active');
    try { Sound.unlock(); } catch (err) {}
    updateFromPoint(t.clientX, t.clientY);
  }, {passive:false});
  base.addEventListener('touchmove', (e) => {
    for (const t of e.changedTouches) {
      if (t.identifier === activeTouchId) {
        e.preventDefault();
        updateFromPoint(t.clientX, t.clientY);
      }
    }
  }, {passive:false});
  function touchEnd(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === activeTouchId) {
        e.preventDefault();
        activeTouchId = null;
        reset();
      }
    }
  }
  base.addEventListener('touchend', touchEnd, {passive:false});
  base.addEventListener('touchcancel', touchEnd, {passive:false});

  // mouse fallback for desktop testing
  let mouseActive = false;
  base.addEventListener('mousedown', (e) => {
    mouseActive = true;
    base.classList.add('active');
    updateFromPoint(e.clientX, e.clientY);
  });
  window.addEventListener('mousemove', (e) => {
    if (mouseActive) updateFromPoint(e.clientX, e.clientY);
  });
  window.addEventListener('mouseup', () => {
    if (mouseActive) { mouseActive = false; reset(); }
  });
}
setupJoystick();
bindTouchButton('tPunch', 'KeyZ');
bindTouchButton('tKick', 'KeyX');
// Space and R (used for pause/continue and restart) also need a touch-friendly trigger:
// tapping anywhere on the canvas works as a stand-in for Space/R when the game is paused/over.
document.getElementById('game').addEventListener('touchstart', (e) => {
  if (!running) {
    e.preventDefault();
    Sound.unlock();
    if (gameOverFlag) { keys['KeyR'] = true; setTimeout(()=>keys['KeyR']=false, 100); }
    else { keys['Space'] = true; setTimeout(()=>keys['Space']=false, 100); }
  }
}, {passive:false});

let dbgTouches = 0;
let startTriggered = false;
function doStart() {
  if (startTriggered) return; // guard against double-firing from both touchend and click
  startTriggered = true;
  setTimeout(() => { startTriggered = false; }, 800);
  dbgClicks++;
  try {
    document.getElementById('startBtn').style.display = 'none';
    startGame();
  } catch (err) {
    showError('Kunde inte starta spelet: ' + (err && err.message ? err.message : err));
    document.getElementById('startBtn').style.display = '';
    return;
  }
  try {
    Sound.unlock();
    Sound.click();
    Sound.intro();
    setTimeout(Sound.startMusic, 1600);
  } catch (err) {
    console.warn('Audio init failed, continuing without sound:', err);
  }
}
document.getElementById('startBtn').addEventListener('click', doStart);
document.getElementById('startBtn').addEventListener('touchend', (e) => {
  dbgTouches++;
  e.preventDefault();
  doStart();
}, {passive:false});

function startGame() {
  running = true;
  gameOverFlag = false;
  stage = 1;
  score = 0;
  lives = 3;
  player.health = 100;
  enemies = [];
  particles = [];
  sparks = [];
  knives = [];
  pickups = [];
  enemiesDefeatedThisStage = 0;
  enemiesNeeded = 6;
  spawnCooldown = 60;
  setupStage();
  hideMsg();
  Sound.startMusic();
}

function setupStage() {
  // world length grows a bit each stage, hazard sits partway through, boss waits at the end
  levelLength = 2400 + (stage-1) * 350;
  const baseX = Math.round(levelLength * 0.42);
  const obstacleVariant = (stage - 1) % 3;
  pits = [];
  block = null;
  if (obstacleVariant === 0) {
    // a single pit to jump over - comfortably clearable with a normal running jump
    pits.push({ x: baseX, halfW: 32 + Math.min(stage,4)*2 });
  } else if (obstacleVariant === 1) {
    // two separate pits with real solid ground between them:
    // jump the first hole, land safely, then jump the second
    const hw = 30 + Math.min(stage,4)*2;
    const offset = 95; // leaves a solid platform of roughly 2*(offset-hw) between the two pits
    pits.push({ x: baseX - offset, halfW: hw });
    pits.push({ x: baseX + offset, halfW: hw });
  } else {
    // a stone block sitting on the ground to hop over instead of a gap
    block = { x: baseX, halfW: 32, height: 44 };
  }
  boss = null;
  bossSpawned = false;
  bossDefeated = false;
  cameraX = 0;
  checkpointX = 40;
  player.x = 60;
  player.y = groundY;
  player.vy = 0;
  player.onGround = true;
  enemies = [];
  knives = [];
  pickups = [];
  gasClouds = [];
  spawnCooldown = 60;
}

function showMsg(text, sub) {
  const m = document.getElementById('msg');
  m.innerHTML = text + (sub ? '<div style="font-size:16px;color:#fff;margin-top:10px;">'+sub+'</div>' : '');
  m.style.display = 'block';
}
function hideMsg() { document.getElementById('msg').style.display = 'none'; }

// called when the player runs out of health or falls into a pit
function handlePlayerDefeat() {
  lives--;
  player.attackType = null;
  player.lowAttack = false;
  player.jumpKick = false;
  knives = [];
  if (lives > 0) {
    player.health = player.maxHealth;
    player.x = checkpointX;
    player.y = groundY;
    player.vy = 0;
    player.onGround = true;
    player.hurtTimer = 45; // brief grace period so you can't be hit the instant you respawn
    flashTimer = 10; shake = 12;
    running = false;
    showMsg('DU FÖRLORADE ETT LIV', 'Liv kvar: ' + lives + '<br><br>Tryck MELLANSLAG för att fortsätta');
  } else {
    player.health = 0;
    player.y = groundY;
    gameOverFlag = true;
    Sound.stopMusic();
    Sound.gameOver();
    showMsg('GAME OVER', 'Poäng: ' + score + '<br><br>Tryck R för att starta om');
  }
}

const ENEMY_PALETTES = [
  {shirt:'#2e6b8e', pants:'#1a3a4a', skin:'#e0a878'},
  {shirt:'#2e8e4a', pants:'#1a4a2a', skin:'#c98a5c'},
  {shirt:'#8e6a2e', pants:'#4a3a1a', skin:'#e0b090'},
];
const BIKER_PALETTES = [
  {shirt:'#2a2a2e', pants:'#161618', skin:'#c98a5c'},
  {shirt:'#39241f', pants:'#1c1210', skin:'#e0a878'},
];

// each stage cycles through a different boss archetype for variety
const BOSS_TYPES = [
  { name: 'NINJALEDAREN',    style: 'ninja',  hairColor: '#0a0a0a', pal: {shirt:'#141418', pants:'#0a0a0e', skin:'#d0a074'} },
  { name: 'GAMLE MÄSTAREN',  style: 'karate', hairColor: '#e8e8e8', pal: {shirt:'#e8e4d6', pants:'#c9c2ac', skin:'#c89060'}, weapon: 'nunchaku' },
  { name: 'MC-KUNGEN',       style: 'biker',  hairColor: '#0a0a0a', pal: {shirt:'#2c1414', pants:'#160a0a', skin:'#c98a5c'} },
  { name: 'RÖDA DRAKEN',     style: 'karate', hairColor: '#0a0a0a', pal: {shirt:'#7a1f2e', pants:'#241014', skin:'#d0906a'} },
];

function pickEnemyType() {
  const r = Math.random();
  if (r < 0.14) return 'thrower';
  if (r < 0.14 + 0.22) return 'biker';
  if (r < 0.14 + 0.22 + 0.2 + stage*0.02) return 'heavy';
  return 'grunt';
}
function spawnEnemy() {
  const fromLeft = Math.random() < 0.25; // mostly ambush from ahead, occasionally from behind
  const type = pickEnemyType();
  let pal, w, h, speed, health, cooldown;
  if (type === 'heavy') {
    pal = {shirt:'#8e2e2e', pants:'#4a1a1a', skin:'#d0906a'};
    w = 48; h = 78; speed = 1.2 + stage*0.12; health = 3; cooldown = 60 + Math.random()*60;
  } else if (type === 'biker') {
    pal = BIKER_PALETTES[Math.floor(Math.random()*BIKER_PALETTES.length)];
    w = 42; h = 74; speed = 1.5 + stage*0.1; health = 2; cooldown = 55 + Math.random()*50;
  } else if (type === 'thrower') {
    pal = {shirt:'#243024', pants:'#141c14', skin:'#d0a074'};
    w = 38; h = 68; speed = 1.3 + stage*0.08; health = 1; cooldown = 90 + Math.random()*40;
  } else {
    pal = ENEMY_PALETTES[Math.floor(Math.random()*ENEMY_PALETTES.length)];
    w = 40; h = 70; speed = 1.8 + stage*0.12; health = 1; cooldown = 60 + Math.random()*60;
  }
  const spawnX = fromLeft ? cameraX - 30 : cameraX + W + 30;
  const e = {
    x: Math.max(20, Math.min(levelLength - 20, spawnX)),
    y: groundY,
    vy: 0, onGround: true,
    w, h,
    dir: fromLeft ? 1 : -1,
    type,
    speed,
    health,
    state: 'approach',
    attackTimer: 0,
    cooldown,
    hurtTimer: 0,
    walkPhase: Math.random()*Math.PI*2,
    pal
  };
  enemies.push(e);
}

function update() {
  if (gameOverFlag) return;
  frameCount++;
  if (shake > 0) shake--;
  if (flashTimer > 0) flashTimer--;

  player.moving = false;
  if (!player.hurtTimer && !keys['ArrowDown']) {
    if (keys['ArrowLeft']) { player.x -= player.speed; player.facing = -1; player.moving = true; }
    if (keys['ArrowRight']) { player.x += player.speed; player.facing = 1; player.moving = true; }
  }
  player.x = Math.max(30, Math.min(levelLength - 30, player.x));

  // Prevent walking straight through enemies
  for (const en of enemies) {
    if (en.state === 'dead') continue;
    const minDist = (player.w*0.5 + en.w*0.5) * 0.72;
    const dx = player.x - en.x;
    if (Math.abs(dx) < minDist) {
      player.x = en.x + Math.sign(dx || (player.facing || 1)) * minDist;
    }
  }
  player.x = Math.max(30, Math.min(levelLength - 30, player.x));

  // camera follows the player through the level
  cameraX = Math.max(0, Math.min(Math.max(0, levelLength - W), player.x - W/2));

  if (player.moving) {
    const prevPhase = player.walkPhase;
    player.walkPhase += 0.25;
    // play a soft footstep each time a foot plants (phase crosses a multiple of PI)
    if (Math.floor(prevPhase / Math.PI) !== Math.floor(player.walkPhase / Math.PI)) {
      Sound.footstep();
    }
  } else {
    player.walkPhase = 0;
  }

  player.ducking = (keys['ArrowDown'] && player.onGround && !player.attackType) || (player.attackType && player.lowAttack);

  if (keys['ArrowUp'] && player.onGround && !player.ducking) {
    player.vy = -8.6;
    player.onGround = false;
  }
  player.y += player.vy;
  player.vy += 0.6;
  player.airTime = player.onGround ? 0 : player.airTime + 1;
  const overPit = pits.some(p => player.x > p.x - p.halfW && player.x < p.x + p.halfW);
  if (player.y >= groundY) {
    if (overPit) {
      // no ground here - keep falling into the pit
      player.onGround = false;
      if (player.y > groundY + 150 && !gameOverFlag) {
        Sound.hurt();
        handlePlayerDefeat();
      }
    } else {
      player.y = groundY; player.vy = 0; player.onGround = true;
    }
  }
  // a solid stone block blocks movement unless jumped high enough to clear it
  if (block) {
    const nearBlock = player.x > block.x - block.halfW - player.w*0.4 && player.x < block.x + block.halfW + player.w*0.4;
    const clearedHeight = player.y < groundY - block.height + 12;
    if (nearBlock && !clearedHeight) {
      if (player.x < block.x) player.x = block.x - block.halfW - player.w*0.4;
      else player.x = block.x + block.halfW + player.w*0.4;
    }
  }
  // rolling checkpoint - advances whenever standing safely on solid ground
  if (player.onGround && !overPit) {
    checkpointX = Math.max(checkpointX, player.x - 70);
  }

  if (!player.attackType && !player.hurtTimer) {
    const duckingNow = keys['ArrowDown'] && player.onGround;
    const airborneNow = !player.onGround;
    if (keys['KeyZ']) { player.attackType = 'punch'; player.attackTimer = 14; player.attackHit = false; player.lowAttack = duckingNow; player.jumpKick = false; Sound.whoosh('punch'); }
    else if (keys['KeyX']) {
      player.attackType = 'kick';
      player.attackHit = false;
      player.lowAttack = duckingNow;
      player.jumpKick = airborneNow;
      // low sweep kicks take a bit longer to sweep through, jump kicks are snappier
      player.attackTimer = duckingNow ? 27 : (airborneNow ? 18 : 20);
      Sound.whoosh('kick');
    }
  }
  // flying kick: a bit of forward momentum while airborne mid-kick
  if (player.attackType === 'kick' && player.jumpKick && !player.onGround) {
    player.x += player.facing * 3.2;
  }
  if (player.attackTimer > 0) {
    player.attackTimer--;
    const activeFrame = player.attackType === 'punch' ? player.attackTimer < 9 && player.attackTimer > 3
                                                        : player.attackTimer < 13 && player.attackTimer > 5;
    if (activeFrame && !player.attackHit) {
      const reach = player.attackType === 'punch' ? 56 : (player.lowAttack ? 86 : 74);
      for (const en of enemies) {
        if (en.state === 'dead') continue;
        const dx = en.x - player.x;
        const vTolerance = player.attackType === 'kick' ? 60 : 40;
        if (Math.sign(dx || player.facing) === player.facing && Math.abs(dx) < reach && Math.abs(en.y - player.y) < vTolerance) {
          en.health -= 1;
          en.hurtTimer = 12;
          en.knockback = player.facing * 10;
          spawnParticles(en.x, en.y - en.h/2, en.pal.shirt);
          spawnBlood(en.x + player.facing*8, en.y - en.h*0.55, player.facing);
          spawnSpark(en.x + player.facing*15, en.y - en.h*0.55);
          shake = 6;
          Sound.hit(player.attackType);
          if (en.health <= 0) {
            en.state = 'dead';
            en.deadTimer = 30;
            score += en.type === 'boss' ? 1000 : (en.type === 'heavy' ? 300 : 100);
            enemiesDefeatedThisStage++;
            Sound.enemyDown();
            if (en.type === 'thrower' && Math.random() < 0.65) {
              pickups.push({ x: en.x, y: groundY, bobPhase: Math.random()*Math.PI*2, collected: false });
            }
            if (en.type === 'boss') {
              bossDefeated = true;
              boss = null;
            }
          }
          player.attackHit = true;
        }
      }
    }
    if (player.attackTimer <= 0) { player.attackType = null; player.lowAttack = false; player.jumpKick = false; }
  }
  if (player.hurtTimer > 0) player.hurtTimer--;

  spawnCooldown--;
  if (!bossSpawned && spawnCooldown <= 0 && enemies.filter(e=>e.state!=='dead').length < 3 &&
      (enemiesDefeatedThisStage + enemies.length) < enemiesNeeded) {
    spawnEnemy();
    spawnCooldown = Math.max(40, 90 - stage*5);
  }

  // boss appears once the player nears the end of the level
  if (!bossSpawned && player.x > levelLength - 260) {
    bossSpawned = true;
    const bossDef = BOSS_TYPES[(stage-1) % BOSS_TYPES.length];
    boss = {
      x: Math.min(levelLength - 40, cameraX + W + 40),
      y: groundY,
      vy: 0, onGround: true,
      w: 66, h: 104,
      dir: -1,
      type: 'boss',
      bossStyle: bossDef.style,
      hairColor: bossDef.hairColor,
      weapon: bossDef.weapon || null,
      speed: 1.4 + stage*0.1,
      health: 16 + stage*3,
      maxHealth: 16 + stage*3,
      state: 'approach',
      attackTimer: 0,
      cooldown: 38 + Math.random()*20,
      hurtTimer: 0,
      walkPhase: Math.random()*Math.PI*2,
      pal: bossDef.pal,
      specialTimer: 90 + Math.random()*50
    };
    enemies.push(boss);
    showMsg(bossDef.name, '');
    setTimeout(hideMsg, 1400);
  }

  for (const en of enemies) {
    if (en.state === 'dead') { en.deadTimer--; continue; }
    if (en.hurtTimer > 0) {
      en.hurtTimer--;
      en.x += (en.knockback || 0) * 0.3;
      en.knockback *= 0.8;
      continue;
    }
    const dx = player.x - en.x;
    const dist = Math.abs(dx);
    en.dir = Math.sign(dx) || en.dir;

    // hop over pits/blocks instead of just walking straight through them -
    // trigger right at the near edge (depending on travel direction) and give a
    // speed boost during the jump so the whole gap is cleared in a single leap
    const hazards = block ? [...pits, block] : pits;
    if (hazards.length && en.onGround && !en.jumpedPit) {
      for (const hz of hazards) {
        const nearEdge = en.dir > 0 ? hz.x - hz.halfW : hz.x + hz.halfW;
        const approaching = en.dir > 0 ? (en.x >= nearEdge - 6 && en.x < nearEdge + 6)
                                        : (en.x <= nearEdge + 6 && en.x > nearEdge - 6);
        if (approaching) {
          en.vy = -9.5;
          en.onGround = false;
          en.jumpedPit = true;
          break;
        }
      }
    }
    if (!en.onGround) {
      en.y += en.vy;
      en.vy += 0.6;
      if (en.y >= groundY) { en.y = groundY; en.vy = 0; en.onGround = true; }
    } else if (en.jumpedPit && !hazards.some(hz => en.x > hz.x - hz.halfW - 30 && en.x < hz.x + hz.halfW + 30)) {
      en.jumpedPit = false; // clear of all hazards, allow jumping again if they turn back around
    }
    const hSpeedMul = !en.onGround ? 2.3 : 1; // extra push mid-air to clear the whole gap

    // boss special attacks - each archetype gets its own signature move on a cooldown
    if (en.type === 'boss') {
      en.specialTimer--;

      // punish mechanic: attacking the ninja while crouched guarantees a sword counter-hit
      const ninjaCounter = en.bossStyle === 'ninja' && player.attackType && player.lowAttack
        && dist < 130 && en.specialAttackLock <= 0 && !(en.swordSlashTimer > 0) && en.hurtTimer <= 0;

      if (ninjaCounter) {
        en.swordSlashTimer = 22;
        en.hasSword = true;
        en.state = 'attack';
        en.attackKind = 'punch';
        en.attackTimer = 22;
        en.specialAttackLock = 22;
        en.specialTimer = 130 + Math.random()*60;
      } else if (en.specialTimer <= 0) {
        en.specialTimer = 130 + Math.random()*60;
        if (en.bossStyle === 'ninja') {
          const useShuriken = dist > 150 ? true : (dist < 100 ? false : Math.random() < 0.5);
          if (useShuriken) {
            // far away - throws a spinning shuriken at the player
            knives.push({ x: en.x + en.dir*24, vx: en.dir*7.5, dir: en.dir, hit: false, star: true });
            Sound.whoosh('kick');
            en.specialAttackLock = 14;
          } else {
            // close range - draws a sword for a wide slash with extra reach
            en.swordSlashTimer = 22;
            en.hasSword = true;
            en.state = 'attack';
            en.attackKind = 'punch';
            en.attackTimer = 22;
            en.specialAttackLock = 22;
          }
        } else if (en.bossStyle === 'biker') {
          // motorcycle chain lash - a big swing that reaches much further than a normal punch
          en.chainLashTimer = 20;
          en.state = 'attack';
          en.attackKind = 'punch';
          en.attackTimer = 20;
          en.specialAttackLock = 20;
        } else if (en.bossStyle === 'karate') {
          if (en.weapon === 'nunchaku' && dist > 140 && Math.random() < 0.6) {
            // throws a bottle that shatters into a damaging green gas cloud
            knives.push({ x: en.x + en.dir*24, vx: en.dir*6, dir: en.dir, hit: false, bottle: true, targetX: player.x });
            Sound.whoosh('kick');
            en.specialAttackLock = 14;
          } else {
            // a focused strike - telegraphs briefly then lands a heavier hit than usual
            en.focusedStrikeTimer = 16;
            en.state = 'attack';
            en.attackKind = Math.random() < 0.5 ? 'kick' : 'punch';
            en.attackTimer = 16;
            en.specialAttackLock = 16;
          }
        }
      }
      if (en.chainLashTimer > 0) {
        en.chainLashTimer--;
        if (en.attackTimer > 0) en.attackTimer--;
        if (en.chainLashTimer === 10 && dist < 175 && !player.hurtTimer && !player.ducking) {
          player.health -= 14;
          player.hurtTimer = 25;
          flashTimer = 8; shake = 10;
          spawnParticles(player.x, player.y - 30, '#ffcc00');
          spawnBlood(player.x, player.y - 35, -player.facing);
          Sound.hurt();
          Sound.hit('punch');
          if (player.health <= 0) handlePlayerDefeat();
        }
      }
      if (en.swordSlashTimer > 0) {
        en.swordSlashTimer--;
        if (en.attackTimer > 0) en.attackTimer--;
        if (en.swordSlashTimer === 12 && dist < 130 && !player.hurtTimer && !player.ducking) {
          player.health -= 13;
          player.hurtTimer = 25;
          flashTimer = 8; shake = 10;
          spawnParticles(player.x, player.y - 30, '#dfe6ea');
          spawnBlood(player.x, player.y - 35, -player.facing);
          Sound.hurt();
          Sound.hit('punch');
          if (player.health <= 0) handlePlayerDefeat();
        }
      }
      if (en.focusedStrikeTimer > 0) {
        en.focusedStrikeTimer--;
        if (en.attackTimer > 0) en.attackTimer--;
        if (en.focusedStrikeTimer === 8 && dist < 95 && !player.hurtTimer && !player.ducking) {
          player.health -= 22; // baseline boss damage plus the focused bonus baked in
          player.hurtTimer = 25;
          flashTimer = 8; shake = 10;
          spawnParticles(player.x, player.y - 30, '#ffcc00');
          spawnBlood(player.x, player.y - 35, -player.facing);
          spawnSpark(player.x - en.dir*15, player.y - 40);
          Sound.hurt();
          Sound.hit(en.attackKind);
          if (player.health <= 0) handlePlayerDefeat();
        }
      }
    }

    // while a special attack is playing out, freeze the normal approach/engage logic
    // so it doesn't immediately overwrite the attack (this was causing the boss to
    // stutter/glitch between states right after triggering a special move)
    if (en.specialAttackLock > 0) {
      en.specialAttackLock--;
      continue;
    }

    if (en.type === 'thrower') {
      // ranged: hangs back and throws knives - back away if the player closes in
      if (dist < 90) {
        en.x -= en.dir * en.speed * hSpeedMul;
        en.state = 'approach';
        en.walkPhase += 0.2;
      } else if (dist > 260) {
        en.x += en.dir * en.speed * hSpeedMul;
        en.state = 'approach';
        en.walkPhase += 0.2;
      } else {
        en.state = 'attack';
        en.attackKind = 'punch';
        en.attackTimer--;
        if (en.attackTimer <= 0) {
          en.attackTimer = en.cooldown;
          knives.push({ x: en.x + en.dir*22, vx: en.dir*6.5, dir: en.dir, hit: false });
          Sound.whoosh('punch');
        }
      }
      continue;
    }

    const engageDist = en.type === 'biker' ? 68 : (en.type === 'boss' ? 78 : 55);
    if (dist > engageDist || !en.onGround) {
      en.x += en.dir * en.speed * hSpeedMul;
      en.state = 'approach';
      en.walkPhase += 0.2;
    } else {
      if (en.state !== 'attack') en.attackKind = Math.random() < 0.5 ? 'kick' : 'punch';
      en.state = 'attack';
      en.attackTimer--;
      if (en.attackTimer <= 0) {
        en.attackTimer = en.cooldown;
        if (!player.hurtTimer && !player.ducking) {
          const dmg = en.type === 'boss' ? 19 : (en.type === 'heavy' ? 12 : (en.type === 'biker' ? 10 : 7));
          player.health -= dmg;
          player.hurtTimer = 25;
          flashTimer = 8; shake = 10;
          spawnParticles(player.x, player.y - 30, '#ffcc00');
          spawnBlood(player.x, player.y - 35, -player.facing);
          spawnSpark(player.x - en.dir*15, player.y - 40);
          Sound.hurt();
          if (player.health <= 0) {
            handlePlayerDefeat();
          }
        }
      }
    }
  }
  enemies = enemies.filter(en => !(en.state === 'dead' && en.deadTimer <= 0));

  // thrown knives / shurikens / bottles - must duck to avoid the projectiles
  for (const k of knives) { k.x += k.vx; }
  for (const k of knives) {
    if (k.hit) continue;
    if (k.bottle) {
      // travels to roughly where the player was, then shatters into a gas cloud
      const reached = (k.dir > 0 && k.x >= k.targetX) || (k.dir < 0 && k.x <= k.targetX);
      if (reached || Math.abs(k.x - cameraX - W/2) > W) {
        k.hit = true;
        gasClouds.push({ x: k.x, y: groundY, radius: 60, life: 220, tickTimer: 0 });
        spawnParticles(k.x, groundY - 60, '#7ee67e');
        Sound.hit('kick');
      }
      continue;
    }
    if (!player.ducking && !player.hurtTimer && Math.abs(k.x - player.x) < 20) {
      k.hit = true;
      player.health -= 8;
      player.hurtTimer = 25;
      flashTimer = 8; shake = 8;
      spawnParticles(player.x, player.y - 42, '#d8dde0');
      spawnBlood(player.x, player.y - 35, -player.facing);
      Sound.hurt();
      if (player.health <= 0) {
        handlePlayerDefeat();
      }
    }
  }
  knives = knives.filter(k => !k.hit && k.x > cameraX-40 && k.x < cameraX+W+40);

  // lingering poison gas clouds from shattered bottles - standing in one hurts, ducking doesn't help (it's gas, not a projectile)
  for (const cloud of gasClouds) {
    cloud.life--;
    cloud.tickTimer--;
    if (cloud.tickTimer <= 0 && Math.abs(player.x - cloud.x) < cloud.radius && !player.hurtTimer) {
      cloud.tickTimer = 45;
      player.health -= 3;
      player.hurtTimer = 15; // brief buffer so it nudges you rather than melting your health
      flashTimer = 5; shake = 3;
      spawnParticles(player.x, player.y - 30, '#7ee67e');
      Sound.hurt();
      if (player.health <= 0) handlePlayerDefeat();
    }
  }
  gasClouds = gasClouds.filter(c => c.life > 0);

  // energy bottle pickups - walk into one to heal
  for (const p of pickups) {
    if (p.collected) continue;
    p.bobPhase += 0.12;
    if (Math.abs(p.x - player.x) < 26 && player.health < player.maxHealth) {
      p.collected = true;
      player.health = Math.min(player.maxHealth, player.health + 30);
      spawnParticles(player.x, player.y - 30, '#5ce65c');
      Sound.heal();
    }
  }
  pickups = pickups.filter(p => !p.collected);


  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life--; });
  particles = particles.filter(p => p.life > 0);
  sparks.forEach(s => s.life--);
  sparks = sparks.filter(s => s.life > 0);

  if (!gameOverFlag && bossDefeated && enemies.filter(e=>e.type==='boss').length === 0) {
    stage++;
    enemiesDefeatedThisStage = 0;
    enemiesNeeded = 6 + stage * 2;
    player.health = Math.min(player.maxHealth, player.health + 20);
    running = false;
    Sound.levelUp();
    showMsg('NIVÅ ' + (stage-1) + ' KLARAD!', 'Nästa nivå: ' + stage + '<br><br>Tryck MELLANSLAG för att fortsätta');
    setupStage();
  }

  document.getElementById('healthTxt').textContent = Math.round(player.health);
  document.getElementById('livesTxt').textContent = lives;
  document.getElementById('stageTxt').textContent = stage;
  document.getElementById('scoreTxt').textContent = score;
}

function spawnParticles(x, y, color) {

    particles.push({ x, y, vx: (Math.random()-0.5)*6, vy: -Math.random()*5, life: 20, color });

}
function spawnBlood(x, y, dir) {

      x, y,

function spawnSpark(x, y) {
